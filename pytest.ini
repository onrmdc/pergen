[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    -p no:cacheprovider
markers =
    unit: fast in-process unit tests
    integration: Flask test-client / multi-component tests
    security: OWASP / fuzz / injection / SSRF tests
    golden: snapshot tests that lock pre-refactor behaviour
filterwarnings =
    ignore::DeprecationWarning:urllib3.*
    ignore::DeprecationWarning:paramiko.*
    ignore::ResourceWarning
    # Wave-3 Phase 6 — backend.credential_store is intentionally
    # deprecation-flagged for the migration window; ignore in tests so
    # CI doesn't see a noisy DeprecationWarning per import.
    ignore::DeprecationWarning:backend.credential_store
