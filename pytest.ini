[pytest]
testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts =
    -ra
    --strict-markers
    --strict-config
    -p no:cacheprovider
markers =
    unit: fast in-process unit tests
    integration: Flask test-client / multi-component tests
    security: OWASP / fuzz / injection / SSRF tests
    golden: snapshot tests that lock pre-refactor behaviour
filterwarnings =
    ignore::DeprecationWarning:urllib3.*
    ignore::DeprecationWarning:paramiko.*
    ignore::ResourceWarning
