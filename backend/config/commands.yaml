# Commands per vendor/role. Each command has a unique id, method (ssh|api), and spec.
# Device (vendor, role) is matched; roles list empty means all roles for that vendor.
# id is used in parsers.yaml to define parsed fields.
commands:
  - id: arista_show_version
    vendor: Arista
    model: EOS
    roles: [Leaf, Spine, Wan-Edge, Border-Leaf, Border-Gateway, Wan-Router, DCI-Router]
    method: api
    api:
      path: /command-api
      commands: ["show version | json"]

  - id: arista_show_uptime
    vendor: Arista
    model: EOS
    roles: [Leaf, Spine, Wan-Edge, Border-Leaf, Border-Gateway, Wan-Router, DCI-Router]
    method: api
    api:
      path: /command-api
      commands: ["show uptime | json"]

  - id: arista_show_bgp_evpn_summary
    vendor: Arista
    model: EOS
    roles: [Leaf, Spine]
    method: api
    api:
      path: /command-api
      commands: ["show bgp evpn summary | json"]

  - id: arista_show_interfaces_status
    vendor: Arista
    model: EOS
    roles: [Leaf, Spine, Wan-Edge, Border-Leaf, Border-Gateway]
    method: api
    api:
      path: /command-api
      commands: ["show interfaces status | json"]

  - id: arista_show_bgp_summary
    vendor: Arista
    model: EOS
    roles: [Leaf, Spine, Wan-Edge, Border-Leaf, Border-Gateway, Wan-Router, DCI-Router]
    method: api
    api:
      path: /command-api
      commands: ["show bgp summary | json"]

  - id: cisco_nxos_show_version
    vendor: Cisco
    model: NX-OS
    roles: [Leaf, Spine, Wan-Edge, Border-Leaf, Border-Gateway]
